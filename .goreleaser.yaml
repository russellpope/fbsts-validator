version: 2

builds:
  - id: fbsts
    main: ./cmd/fbsts
    binary: fbsts
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: fbsts
    builds:
      - fbsts
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "fbsts_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
